<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ page.title }} | {{ site.title }}</title>
<link rel="icon" href="{{ '/assets/images/favicon.png' | relative_url }}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- JetBrains Mono — actually loaded now -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/line-numbers/prism-line-numbers.min.css">
<link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
</head>
<body>

<div class="crt-bezel"></div>
<div class="crt-scanline-roll"></div>
<div class="noise-overlay"></div>
<div class="digital-grid"></div>
<div class="grid-highlight"></div>

<!-- Targeting reticle — replaces axis scanlines + cursor glow -->
<div class="reticle" id="reticle">
  <div class="reticle-corner tl"></div>
  <div class="reticle-corner tr"></div>
  <div class="reticle-corner bl"></div>
  <div class="reticle-corner br"></div>
  <div class="reticle-cross-h"></div>
  <div class="reticle-cross-v"></div>
  <div class="reticle-dot"></div>
</div>

{% if page.url == "/" %}
<div id="boot-sequence" class="boot">
  <pre id="boot-text"></pre>
</div>
{% endif %}

<div id="main-content" {% unless page.url == "/" %}style="display:block;"{% else %}style="display:none;"{% endunless %}>
  <header>
    <h1 class="title">{{ site.title }}</h1>
    <p class="desc">{{ site.description }}</p>
    {% unless page.url == "/" %}
    <nav>
      <a href="{{ '/' | relative_url }}" class="home-link">← Back to Lab</a>
    </nav>
    {% endunless %}
  </header>
  <main>
    {{ content }}
  </main>
</div>

<div class="cursor-light"></div>

<!-- ============================================================
     ALL JS IN ONE DOMContentLoaded — one parse pass, no redundancy
     ============================================================ -->
<script>
(function () {
  'use strict';

  // ── CURSOR GLOW + TARGETING RETICLE ──────────────────────────────────────
  // Two separate trackers with different lag coefficients:
  //   cursor-light (0.3) leads — feels like the screen phosphor bleeding
  //   reticle      (0.15) trails — feels like it's locking on to a target
  const cursor      = document.querySelector('.cursor-light');
  const reticle     = document.querySelector('.reticle');
  const gridHighlight = document.querySelector('.grid-highlight');

  let x = 0, y = 0, targetX = 0, targetY = 0;
  let rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    targetX = e.clientX;
    targetY = e.clientY;
    if (gridHighlight) {
      gridHighlight.style.left = `${e.clientX}px`;
      gridHighlight.style.top  = `${e.clientY}px`;
    }
  });

  (function animateCursor() {
    x  += (targetX - x)  * 0.3;
    y  += (targetY - y)  * 0.3;
    rx += (targetX - rx) * 0.15;
    ry += (targetY - ry) * 0.15;

    if (cursor) {
      cursor.style.left = `${x}px`;
      cursor.style.top  = `${y}px`;
    }
    if (reticle) {
      reticle.style.left = `${rx}px`;
      reticle.style.top  = `${ry}px`;
    }
    requestAnimationFrame(animateCursor);
  })();

  // ── BOOT SEQUENCE (index only) ────────────────────────────────────────────
  {% if page.url == "/" %}
  const bootLines   = [">Great to see you. I'm 0xm0t0k0 aka 0xth00rf1nn aka c1nn4m0nr0ls"];
  const bootText    = document.getElementById('boot-text');
  const bootScreen  = document.getElementById('boot-sequence');
  const mainContent = document.getElementById('main-content');

  if (bootText && bootScreen && mainContent) {
    let line = 0, char = 0;

    function typeBootLine() {
      if (line < bootLines.length) {
        if (char < bootLines[line].length) {
          bootText.textContent += bootLines[line].charAt(char++);
          setTimeout(typeBootLine, Math.random() * 30 + 10);
        } else {
          bootText.textContent += '\n';
          line++;
          char = 0;
          setTimeout(typeBootLine, 400);
        }
      } else {
        setTimeout(() => {
          bootScreen.style.opacity = '0';
          setTimeout(() => {
            bootScreen.style.display  = 'none';
            mainContent.style.display = 'block';
          }, 500);
        }, 600);
      }
    }
    typeBootLine();
  }
  {% endif %}

  // ── EVERYTHING BELOW RUNS AFTER DOM IS READY ──────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {

    // ── PORTFOLIO: LOAD MORE + FILTERS + LAZY LOAD ──────────────────────────
    const portfolioItems = document.querySelectorAll('.portfolio-item');
    const loadMoreBtn    = document.getElementById('loadMore');
    const shownCountEl   = document.getElementById('shownCount');
    const totalCountEl   = document.getElementById('totalCount');
    const filterBtns     = document.querySelectorAll('.filter-btn');

    if (loadMoreBtn && portfolioItems.length) {
      const itemsPerLoad = 12;
      let currentItems   = itemsPerLoad;

      if (totalCountEl) totalCountEl.textContent = portfolioItems.length;

      function updateVisibility() {
        let visibleCount = 0;
        portfolioItems.forEach(item => {
          if (!item.classList.contains('hidden-filter')) {
            if (visibleCount < currentItems) {
              item.classList.remove('hidden-load');
              item.style.animationDelay = `${(visibleCount % itemsPerLoad) * 0.1}s`;
              visibleCount++;
            } else {
              item.classList.add('hidden-load');
            }
          }
        });

        if (shownCountEl) shownCountEl.textContent = visibleCount;

        const hiddenFilterCount = document.querySelectorAll('.hidden-filter').length;
        loadMoreBtn.classList.toggle(
          'hidden',
          visibleCount >= portfolioItems.length - hiddenFilterCount
        );
      }

      updateVisibility();

      loadMoreBtn.addEventListener('click', () => {
        currentItems += itemsPerLoad;
        updateVisibility();
      });

      // Lazy load images
      const imageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            if (img.dataset.src) {
              img.src = img.dataset.src;
              img.classList.remove('lazy');
              observer.unobserve(img);
            }
          }
        });
      });
      document.querySelectorAll('.portfolio-img.lazy').forEach(img => imageObserver.observe(img));

      // Filters
      filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          filterBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');

          const filter = btn.getAttribute('data-filter');
          currentItems = itemsPerLoad;

          portfolioItems.forEach(item => {
            item.classList.toggle(
              'hidden-filter',
              filter !== 'all' && item.getAttribute('data-category') !== filter
            );
          });

          updateVisibility();
        });
      });
    }

    // ── LIGHTBOX ──────────────────────────────────────────────────────────────
    const lightbox     = document.getElementById('imageLightbox');
    const lightboxImg  = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    if (lightbox && lightboxImg) {
      document.querySelectorAll('.portfolio-item').forEach(item => {
        item.addEventListener('click', () => {
          const img = item.querySelector('.portfolio-img');
          const src = img?.dataset.src || img?.src;
          if (src) {
            lightboxImg.src       = src;
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
          }
        });
      });

      function closeLightbox() {
        lightbox.style.display = 'none';
        document.body.style.overflow = '';
      }

      if (lightboxClose) lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    }

    // ── TERMINAL NAV ──────────────────────────────────────────────────────────
    const navInput  = document.getElementById('navInput');
    const navOutput = document.getElementById('navOutput');

    if (navInput && navOutput) {
      let commandHistory = [];
      let historyIndex   = -1;

      const commands = {
        help: {
          output: `<span class="info">Available Commands:</span>
  ls                - list sections
  cat about.txt     - view about page
  cd logs/          - go to blog
  cat manifesto/*   - view texts
  clear             - clear screen`
        },
        ls: {
          output: `drwxr-xr-x  visitor  <a href="/about">about.txt</a>
drwxr-xr-x  visitor  logs/
drwxr-xr-x  visitor  manifesto/`
        },
        'cat about.txt': {
          action: () => { setTimeout(() => window.location.href = '/about', 500); return 'Opening about.txt...'; }
        },
        'cd logs/': {
          action: () => {
            document.getElementById('logs')?.scrollIntoView({ behavior: 'smooth' });
            return '✓ Changed directory to logs/';
          }
        },
        'cat manifesto/*': {
          action: () => {
            document.getElementById('texts')?.scrollIntoView({ behavior: 'smooth' });
            return 'Reading manifesto files...';
          }
        },
        clear: {
          action: () => { navOutput.innerHTML = ''; return ''; }
        }
      };

      function typeOutput(text) {
        const line = document.createElement('div');
        line.className = 'cmd-line';
        line.innerHTML  = text;
        navOutput.appendChild(line);
        navOutput.scrollTop = navOutput.scrollHeight;
      }

      function executeCommand(cmd) {
        if (cmd && cmd !== commandHistory[commandHistory.length - 1]) commandHistory.push(cmd);
        historyIndex = commandHistory.length;

        typeOutput(`<span style="color:#fff">$ ${cmd}</span>`);

        const command = commands[cmd] || commands[cmd.replace(/\/$/, '')];
        if (command) {
          const result = command.action ? command.action() : command.output;
          if (result) setTimeout(() => typeOutput(result), 50);
        } else if (cmd.trim()) {
          setTimeout(() => typeOutput(`<span style="color:#ff5f56">Command not found: ${cmd}</span>`), 50);
        }
      }

      navInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          executeCommand(navInput.value.trim());
          navInput.value = '';
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (historyIndex > 0) navInput.value = commandHistory[--historyIndex];
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (historyIndex < commandHistory.length - 1) {
            navInput.value = commandHistory[++historyIndex];
          } else {
            historyIndex   = commandHistory.length;
            navInput.value = '';
          }
        }
      });
    }

    // ── READING MODE (article pages only) ────────────────────────────────────
    const isListPage  = document.querySelector('.posts') || document.querySelector('#logs');
    const mainElement = document.querySelector('main');
    if (mainElement && !isListPage) {
      mainElement.classList.add('full-article-content');
      document.body.classList.add('reading-mode');
    }

    // ── ASSEMBLY SYNTAX HIGHLIGHT ─────────────────────────────────────────────
    document.querySelectorAll('pre code.language-asm, pre code.language-nasm').forEach(block => {
      let html = block.textContent;
      html = html.replace(/\b([re]?[abcd]x|[re]?[sb]p|[re]?[sd]i|r[89]|r1[0-5])\b/gi,
        '<span style="color:#ff6b9d;font-weight:bold;">$1</span>');
      html = html.replace(/\b(mov|add|sub|push|pop|call|ret|jmp|cmp|test|lea|xor|and|syscall)\b/gi,
        '<span style="color:#00ddff;">$1</span>');
      html = html.replace(/\b(0x[0-9a-f]+)\b/gi,
        '<span style="color:#00e5ff;">$1</span>');
      block.innerHTML = html;
    });

  }); // end DOMContentLoaded

})();
</script>

<!-- Prism — deferred so it doesn't block render -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-nasm.min.js" defer></script>

</body>
</html>
